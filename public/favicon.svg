<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- MCPHire favicon — terracotta "M" with MCP-protocol node dot on warm off-white -->
  <rect width="64" height="64" fill="#FAFAF7"/>
  <g fill="#B5563E" fill-rule="evenodd">
    <!-- Left vertical leg of M -->
    <rect x="12" y="14" width="9" height="36" rx="1"/>
    <!-- Right vertical leg of M -->
    <rect x="43" y="14" width="9" height="36" rx="1"/>
    <!-- Left diagonal of M (top-left to middle-center) -->
    <path d="M12 14 L32 38 L26 42 L12 22 Z"/>
    <!-- Right diagonal of M (top-right to middle-center) -->
    <path d="M52 14 L32 38 L38 42 L52 22 Z"/>
    <!-- MCP node dot — bottom-right accent -->
    <circle cx="49" cy="46" r="4"/>
  </g>
</svg>
